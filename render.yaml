services:
  - type: worker
    name: crypto-pair-screener
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: TIMEFRAME
        value: 1h
      - key: CANDLES_LIMIT
        value: 200
      - key: TOP_N_SYMBOLS
        value: 50
      - key: COINT_PMAX
        value: 0.05
      - key: HALFLIFE_MIN
        value: 2
      - key: HALFLIFE_MAX
        value: 72
      - key: MIN_CORRELATION
        value: 0.7
      - key: ZSCORE_THRESHOLD
        value: 2.0
      - key: SLEEP_INTERVAL
        value: 1800
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false